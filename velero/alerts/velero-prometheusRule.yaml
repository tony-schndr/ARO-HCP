apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: kube-prometheus
    prometheus: k8s
    role: alert-rules
  name: velero-monitoring-rules
  namespace: monitoring
spec:
  groups:
  - name: velero
    rules:
    - alert: VeleroHourlyBackupStuck
      expr: |
        max by(schedule, cluster) (max without(prometheus_replica) (increase(velero_backup_success_total{schedule=~".*-hourly", cluster=~".+"}[2h]))) == 0
      for: 15m
      labels:
        severity: warning
      annotations:
        description: 'Velero hourly schedule {{ $labels.schedule }} has had zero fully successful backups in the last 2 hours. A stuck or failed backup may be blocking the queue. Note: PartiallyFailed backups are not counted as successful.'
        runbook_url: 'TBD'
        summary: 'Velero hourly backup stuck: no successful backup for {{ $labels.schedule }} in over 2 hours'
    - alert: VeleroHourlyBackupStuckCritical
      expr: |
        max by(schedule, cluster) (max without(prometheus_replica) (increase(velero_backup_success_total{schedule=~".*-hourly", cluster=~".+"}[6h]))) == 0
      for: 15m
      labels:
        severity: critical
      annotations:
        description: 'Velero hourly schedule {{ $labels.schedule }} has had zero fully successful backups in the last 6 hours. Backups are likely piling up with one stuck backup blocking the queue. Note: PartiallyFailed backups are not counted as successful.'
        runbook_url: 'TBD'
        summary: 'Velero hourly backup critically stuck: no successful backup for {{ $labels.schedule }} in over 6 hours'
    - alert: VeleroDailyBackupStuck
      expr: |
        max by(schedule, cluster) (max without(prometheus_replica) (increase(velero_backup_success_total{schedule=~".*-daily", cluster=~".+"}[26h]))) == 0
      for: 15m
      labels:
        severity: warning
      annotations:
        description: 'Velero daily schedule {{ $labels.schedule }} has had zero fully successful backups in the last 26 hours. A stuck or failed backup may be blocking the queue. Note: PartiallyFailed backups are not counted as successful.'
        runbook_url: 'TBD'
        summary: 'Velero daily backup stuck: no successful backup for {{ $labels.schedule }} in over 26 hours'
    - alert: VeleroDailyBackupStuckCritical
      expr: |
        max by(schedule, cluster) (max without(prometheus_replica) (increase(velero_backup_success_total{schedule=~".*-daily", cluster=~".+"}[50h]))) == 0
      for: 15m
      labels:
        severity: critical
      annotations:
        description: 'Velero daily schedule {{ $labels.schedule }} has had zero fully successful backups in the last 50 hours. Backups are likely piling up with one stuck backup blocking the queue. Note: PartiallyFailed backups are not counted as successful.'
        runbook_url: 'TBD'
        summary: 'Velero daily backup critically stuck: no successful backup for {{ $labels.schedule }} in over 50 hours'
    - alert: VeleroBackupInProgressTooLong
      expr: |
        count by(schedule, cluster) (max without(prometheus_replica) (veleroBackup_phase{phase="InProgress", cluster=~".+"}) == 1) > 0
      for: 2h
      labels:
        severity: warning
      annotations:
        description: 'Velero schedule {{ $labels.schedule }} has a backup stuck in InProgress phase for over 2 hours. This blocks subsequent backups from being processed.'
        runbook_url: 'TBD'
        summary: 'Velero backup stuck InProgress for {{ $labels.schedule }} for over 2 hours'
  # Recording rules: aggregate away the unbounded 'backupName' label on
  # velero_csi_snapshot_* counters (one new timeseries per backup execution).
  - name: velero-recording-rules
    rules:
    - record: velero:csi_snapshot_attempt:total
      expr: |
        max without(prometheus_replica) (
          sum by (schedule, cluster) (
            velero_csi_snapshot_attempt_total{namespace=~"velero.*", cluster=~".+"}
          )
        )
    - record: velero:csi_snapshot_failure:total
      expr: |
        max without(prometheus_replica) (
          sum by (schedule, cluster) (
            velero_csi_snapshot_failure_total{namespace=~"velero.*", cluster=~".+"}
          )
        )
    - record: velero:backup_duration_seconds:last
      expr: |
        max without(prometheus_replica) (
          rate(velero_backup_duration_seconds_sum{namespace=~"velero.*", cluster=~".+"}[2h])
          /
          rate(velero_backup_duration_seconds_count{namespace=~"velero.*", cluster=~".+"}[2h])
        )
        and
        max without(prometheus_replica) (
          rate(velero_backup_duration_seconds_count{namespace=~"velero.*", cluster=~".+"}[2h])
        ) > 0
  # Anomaly detection alerts ported from ROSA HCP (SLSRE-374), adapted for ARO-HCP.
  - name: velero-anomaly
    rules:
    # Threshold: > 20% failure rate over 2h.
    # Uses recording rules that aggregate away the backupName label.
    - alert: VeleroCSISnapshotFailureRate
      expr: |
        (
          sum by (cluster) (increase(velero:csi_snapshot_failure:total{cluster=~".+"}[2h]))
          /
          sum by (cluster) (increase(velero:csi_snapshot_attempt:total{cluster=~".+"}[2h]))
        ) > 0.2
        and
        sum by (cluster) (increase(velero:csi_snapshot_attempt:total{cluster=~".+"}[2h])) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Velero CSI snapshot failure rate is {{ $value | humanizePercentage }} over the last 2 hours (threshold: 20%).'
        runbook_url: 'TBD'
        summary: 'Velero CSI snapshot failure rate above 20%'
    # Threshold: > 20% failure rate over 2h.
    - alert: VeleroBackupDeletionFailureRate
      expr: |
        (
          sum by (cluster) (max without(prometheus_replica) (increase(velero_backup_deletion_failure_total{namespace=~"velero.*", cluster=~".+"}[2h])))
          /
          sum by (cluster) (max without(prometheus_replica) (increase(velero_backup_deletion_attempt_total{namespace=~"velero.*", cluster=~".+"}[2h])))
        ) > 0.2
        and
        sum by (cluster) (max without(prometheus_replica) (increase(velero_backup_deletion_attempt_total{namespace=~"velero.*", cluster=~".+"}[2h]))) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        description: 'Velero backup deletion failure rate is {{ $value | humanizePercentage }} over the last 2 hours (threshold: 20%).'
        runbook_url: 'TBD'
        summary: 'Velero backup deletion failure rate above 20%'
  # Infrastructure health alerts.
  - name: velero-infrastructure
    rules:
    # No cluster=~".+" — absent() with regex always fires when no series match.
    - alert: VeleroMetricsAbsent
      expr: |
        absent(velero_backup_total{namespace=~"velero.*"})
      for: 15m
      labels:
        severity: critical
      annotations:
        description: 'No Velero backup metrics detected for 15+ minutes. The Velero server may be down or metrics scraping is broken.'
        runbook_url: 'TBD'
        summary: 'Velero metrics absent for over 15 minutes'
