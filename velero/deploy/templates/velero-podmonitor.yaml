{{- range $i, $_ := until (int $.Values.shardCount) }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: velero-{{ $i }}
  namespace: velero-{{ $i }}
spec:
  selector:
    matchLabels:
      deploy: velero
  namespaceSelector:
    matchNames:
    - velero-{{ $i }}
  podMetricsEndpoints:
  - path: /metrics
    port: metrics
    scheme: http
    interval: 30s
---
{{- end }}
